name: Deploy docs to tamer4lynx.github.io

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/docs'
      - 'packages/docs/**'
      - '.github/workflows/deploy-docs.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install --workspaces=false --ignore-scripts
        working-directory: packages/docs

      - run: npm run build
        working-directory: packages/docs

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          external_repository: tamer4lynx/tamer4lynx.github.io
          publish_branch: main
          publish_dir: packages/docs/doc_build
          force_orphan: true
